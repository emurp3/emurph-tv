name: Build EMurph TV APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Apply approved EMurph TV branding
        run: python3 scripts/apply-approved-brand.py

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: yes | sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Download Gradle 8.7
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          echo '/tmp/gradle-8.7/bin' >> "$GITHUB_PATH"

      - name: Build debug APK
        run: gradle --no-daemon assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk EMurph-TV-nightly.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMurph-TV-debug
          path: EMurph-TV-nightly.apk
          if-no-files-found: error
          retention-days: 14
