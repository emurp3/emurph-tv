name: Build EMurph TV APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Apply approved EMurph TV branding
        run: python3 scripts/apply-approved-brand.py

      - name: Apply Fire TV backend fixes
        run: python3 scripts/fix-fire-tv-backend.py

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: yes | sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Download Gradle 8.7
        run: |
          curl -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp
          echo '/tmp/gradle-8.7/bin' >> "$GITHUB_PATH"

      - name: Build side-by-side debug APK
        run: gradle --no-daemon assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk EMurph-TV-Test.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EMurph-TV-backend-test
          path: EMurph-TV-Test.apk
          if-no-files-found: error
          retention-days: 14

      - name: Publish side-by-side test release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v1.7.0-test >/dev/null 2>&1 || \
            gh release create v1.7.0-test --title "EMurph TV v1.7.0 Backend Test" --notes "Side-by-side Fire TV backend-routing test build. Installs separately as EMurph TV Test."
          gh release upload v1.7.0-test EMurph-TV-Test.apk --clobber
