name: Publish EMurph TV clubTivi Test APK

on:
  push:
    branches: [build/clubtivi-engine]
    paths:
      - '.github/workflows/publish-clubtivi-test.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/publish-clubtivi-test.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Download verified APK artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download 29897518102 \
            --repo emurp3/emurph-tv \
            --name EMurph-TV-ClubTivi \
            --dir verified-apk
          test -f verified-apk/EMurph-TV-ClubTivi.apk
          cp verified-apk/EMurph-TV-ClubTivi.apk verified-apk/EMurph-TV-ClubTivi-v2.apk

      - name: Publish isolated Fire TV test release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view v2.0.0-engine1 --repo emurp3/emurph-tv >/dev/null 2>&1 || \
            gh release create v2.0.0-engine1 \
              --repo emurp3/emurph-tv \
              --title "EMurph TV 2.0 — clubTivi Engine Test" \
              --notes "Real clubTivi-based Android TV/Fire TV engine test build. This does not replace the current public EMurph TV release."
          gh release upload v2.0.0-engine1 \
            verified-apk/EMurph-TV-ClubTivi-v2.apk \
            --repo emurp3/emurph-tv
